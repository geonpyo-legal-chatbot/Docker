services:
  back-end:
    build:
      context: ../Back-end
      dockerfile: Dockerfile
    container_name: back-end
    env_file:
      - ./back-end/.env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./fonts:/fonts
    depends_on:
      ollama:
        condition: service_healthy
    gpus: all
    restart: unless-stopped
    networks:
      - main-network

  ollama:
    image: ollama/ollama
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
      - ./models:/models:ro
    gpus: all
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - main-network

  ollama-init:
    image: ollama/ollama
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./models:/models:ro
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - sh
      - -c
      - ollama create law-exaone-7.8b-q6 -f /models/Modelfile
    restart: "no"
    networks:
      - main-network

volumes:
  ollama_data:

networks:
  main-network:
    driver: bridge