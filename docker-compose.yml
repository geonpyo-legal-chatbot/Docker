x-bake:
  no-cache: false
services:
  front-end:
    build:
      context: https://github.com/Main-Main-Project/Front-end.git#main
      dockerfile: Dockerfile
    container_name: front-end
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - back-end
    restart: unless-stopped
    networks:
      - main-network
  
  back-end:
    build:
      context: https://github.com/Main-Main-Project/Back-end.git#develop
      dockerfile: Dockerfile
    container_name: back-end
    ports:
      - "8000:8000"
    volumes:
      - ./fonts:/fonts
    depends_on:
      - postgres
      - ollama
    env_file: ./back-end/.env
    restart: unless-stopped
    networks:
      - main-network

  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: service_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - main-network

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./models:/models
    networks:
      - main-network


  # Ollama 모델 자동 등록 (law-qwen-7b)
  # ollama 뜬 뒤 한 번 실행되고 종료됨
  ollama-init:
    image: ollama/ollama
    container_name: ollama-init
    depends_on:
      - ollama
    volumes:
      - ./models:/models
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        sleep 5 &&
        ollama create law-qwen-7b -f /models/Modelfile
      "
    networks:
      - main-network
    restart: "no"


  # =====================================================
  # Grafana
  # 로그/메트릭 확인용 대시보드
  # =====================================================
  grafana:
    image: grafana/grafana:latest
    container_name: main-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - prometheus
    restart: unless-stopped
    networks:
      - main-network


  # =====================================================
  # Loki
  # 로그 저장소
  # =====================================================
  loki:
    image: grafana/loki:latest
    container_name: main-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    restart: unless-stopped
    networks:
      - main-network

  # =====================================================
  # Promtail
  # Back-end 로그 파일을 읽어서 Loki로 전송
  # =====================================================
  promtail:
    image: grafana/promtail:latest
    container_name: main-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - backend_logs:/app/logging:ro
    depends_on:
      - loki
      - back-end
    restart: unless-stopped
    networks:
      - main-network

  # =====================================================
  # Prometheus
  # Back-end /metrics 수집용
  # =====================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: main-prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - main-network

volumes:
  postgres_data:
  ollama_data:
  backend_logs:
  backend_uploads:
  grafana_data:
  loki_data:
  prometheus_data:

networks:
  main-network:
    driver: bridge

 

